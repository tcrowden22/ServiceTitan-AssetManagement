name: Deploy Azure App Service - stassetapp-prod

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Install server deps
        run: npm ci --prefix server

      - name: Build frontend
        run: npm run build

      - name: Prepare release folder
        run: |
          rm -rf release
          mkdir -p release
          cp package.json package-lock.json index.html vite.config.js release/
          cp -R server release/
          cp -R dist release/
          cp -R src release/

      - name: List release files
        run: find release -maxdepth 4 -type f | sort

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: stassetapp-prod
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./release